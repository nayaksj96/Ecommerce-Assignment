services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - '5672:5672'
      - '15672:15672'

  product-order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: product_order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Satya!123
    ports:
      - '5435:5432'
    volumes:
      - product_order_data:/var/lib/postgresql/data

  customer-db:
    image: postgres:16
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Satya!123
    ports:
      - '5434:5432'
    volumes:
      - customer_data:/var/lib/postgresql/data

volumes:
  product_order_data:
  customer_data:
